# Boxer default configuration
# Copy this to ~/.boxer/config and modify as needed.

[defaults]
# CPU cores allocated to each container
cpu = 4

# Memory limit per container
memory = 8g

# Network mode: restricted (firewall allowlist), none, host
network = restricted

# Docker image to use
image = boxer:latest

[firewall]
# Comma-separated extra domains to allow through the firewall
# Example: extra_domains = my-registry.example.com, internal-api.dev
extra_domains =

[mounts]
# Mount ~/.ssh into containers (read-only)
ssh = true

# Mount ~/.gitconfig into containers (read-only)
gitconfig = true

[sync]
# Copy Claude Code customization (rules, settings, agents, skills,
# commands, hooks, keybindings, plugins, profiles) from host ~/.claude
# into the container on every start.
claude_config = true
